version: '3.8'

services:
  db:
    image: postgres:16
    container_name: my-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Abhi@3105
      POSTGRES_DB: liquidtext
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - db
    ports:
      - "8005:8005"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://postgres:Abhi%403105@db:5432/liquidtext"
    command: sh -c "sleep 10 && uvicorn main:app --host 0.0.0.0 --port 8000"
    

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "3001:3001"
